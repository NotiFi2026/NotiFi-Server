spring:
  application:
    name: NotiFi-Server

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/notifi}
    username: ${DB_USERNAME:notifi}
    password: ${DB_PASSWORD:notifi}
    driver-class-name: org.postgresql.Driver

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: none   # 엔티티 추가 후 Flyway 마이그레이션으로 전환 예정

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
