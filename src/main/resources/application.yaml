spring:
  application:
    name: NotiFi-Server
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/notifi}
    username: ${DB_USERNAME:notifi}
    password: ${DB_PASSWORD:notifi}
    driver-class-name: org.postgresql.Driver

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: none

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
    web:
      pageable:
        max-page-size: 100

  jackson:
    property-naming-strategy: SNAKE_CASE

jwt:
  secret: ${JWT_SECRET:notifi-secret-key-for-local-dev-only-change-in-prod!}
  access-token-ttl: ${JWT_ACCESS_TTL:3600}
  refresh-token-ttl: ${JWT_REFRESH_TTL:604800}

internal:
  api-key: ${INTERNAL_API_KEY:change-me-before-deploy}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:*}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
  packages-to-scan: com.notifi.server.domain

logging:
  level:
    com.notifi: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level [%X{traceId:-}] %logger{36} - %msg%n"
