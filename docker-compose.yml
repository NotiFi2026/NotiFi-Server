services:
  postgres:
    image: postgres:15-alpine
    container_name: notifi-postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-notifi}
      POSTGRES_USER: ${DB_USERNAME:-notifi}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-notifi}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-notifi} -d ${DB_NAME:-notifi}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: notifi-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  app:
    build: .
    container_name: notifi-app
    env_file:
      - .env
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/${DB_NAME:-notifi}
      REDIS_HOST: redis
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
